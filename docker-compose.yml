# Auron E-Commerce Platform - Docker Compose
# Production-grade infrastructure for microservices architecture

services:
  # ============================================================
  # FRONTEND
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    networks:
      - auron-network
    restart: unless-stopped

  # ============================================================
  # API GATEWAY
  # ============================================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - USER_SERVICE_URL=http://user-service:8081
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - INVENTORY_SERVICE_URL=http://inventory-service:8085
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - inventory-service
    networks:
      - auron-network
    restart: unless-stopped

  # ============================================================
  # MICROSERVICES
  # ============================================================
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://auron:auron_pass@users-db:5432/users_db?sslmode=disable
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=postgres://auron:auron_pass@products-db:5433/products_db?sslmode=disable
    depends_on:
      products-db:
        condition: service_healthy
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://auron:auron_pass@orders-db:5434/orders_db?sslmode=disable
    depends_on:
      orders-db:
        condition: service_healthy
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DATABASE_URL=postgres://auron:auron_pass@payments-db:5435/payments_db?sslmode=disable
    depends_on:
      payments-db:
        condition: service_healthy
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - DATABASE_URL=postgres://auron:auron_pass@products-db:5433/products_db?sslmode=disable
    depends_on:
      products-db:
        condition: service_healthy
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - SMTP_HOST=${SMTP_HOST:-smtp-host}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-noreply@auron.shop}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # DATABASES
  # ============================================================
  users-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=auron
      - POSTGRES_PASSWORD=auron_pass
      - POSTGRES_DB=users_db
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auron -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  products-db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=auron
      - POSTGRES_PASSWORD=auron_pass
      - POSTGRES_DB=products_db
    volumes:
      - products-db-data:/var/lib/postgresql/data
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auron -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:15-alpine
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=auron
      - POSTGRES_PASSWORD=auron_pass
      - POSTGRES_DB=orders_db
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auron -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  payments-db:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=auron
      - POSTGRES_PASSWORD=auron_pass
      - POSTGRES_DB=payments_db
    volumes:
      - payments-db-data:/var/lib/postgresql/data
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auron -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MESSAGE BROKER
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - auron-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_started
    networks:
      - auron-network
    restart: unless-stopped

  # ============================================================
  # CACHE
  # ============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - auron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # OBSERVABILITY
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - auron-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - auron-network
    restart: unless-stopped

networks:
  auron-network:
    driver: bridge

volumes:
  users-db-data:
  products-db-data:
  orders-db-data:
  payments-db-data:
  redis-data:
  prometheus-data:
  grafana-data:
